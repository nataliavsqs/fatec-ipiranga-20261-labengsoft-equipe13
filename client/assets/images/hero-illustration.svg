<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#f7fafc"/>
  
  <!-- Books -->
  <rect x="80" y="200" width="40" height="60" fill="#667eea" rx="4"/>
  <rect x="85" y="205" width="30" height="50" fill="white" opacity="0.2"/>
  
  <rect x="125" y="190" width="40" height="70" fill="#764ba2" rx="4"/>
  <rect x="130" y="195" width="30" height="60" fill="white" opacity="0.2"/>
  
  <rect x="170" y="195" width="40" height="65" fill="#48bb78" rx="4"/>
  <rect x="175" y="200" width="30" height="55" fill="white" opacity="0.2"/>
  
  <!-- Laptop -->
  <rect x="220" y="180" width="120" height="80" fill="#2d3748" rx="8"/>
  <rect x="230" y="185" width="100" height="65" fill="#4a5568" rx="4"/>
  <rect x="235" y="190" width="90" height="55" fill="#667eea" rx="2"/>
  
  <!-- Screen content -->
  <circle cx="280" cy="210" r="15" fill="white" opacity="0.9"/>
  <rect x="270" y="225" width="20" height="3" fill="white" opacity="0.7" rx="1"/>
  <rect x="265" y="230" width="30" height="3" fill="white" opacity="0.7" rx="1"/>
  <rect x="275" y="235" width="15" height="3" fill="white" opacity="0.7" rx="1"/>
  
  <!-- Person -->
  <circle cx="150" cy="120" r="25" fill="#fbb6ce"/>
  <rect x="125" y="145" width="50" height="60" fill="#667eea" rx="25"/>
  <rect x="115" y="160" width="20" height="40" fill="#fbb6ce" rx="10"/>
  <rect x="165" y="160" width="20" height="40" fill="#fbb6ce" rx="10"/>
  
  <!-- Graduation cap -->
  <polygon points="125,110 175,110 150,95" fill="#2d3748"/>
  <rect x="145" y="95" width="10" height="15" fill="#2d3748"/>
  <circle cx="155" cy="95" r="3" fill="#f56565"/>
  
  <!-- Floating elements -->
  <circle cx="320" cy="80" r="8" fill="#667eea" opacity="0.6"/>
  <circle cx="60" cy="100" r="6" fill="#764ba2" opacity="0.6"/>
  <circle cx="350" cy="120" r="5" fill="#48bb78" opacity="0.6"/>
  
  <!-- Mathematical symbols -->
  <text x="50" y="50" font-family="Arial" font-size="20" fill="#667eea" opacity="0.7">∑</text>
  <text x="320" y="50" font-family="Arial" font-size="18" fill="#764ba2" opacity="0.7">π</text>
  <text x="300" y="250" font-family="Arial" font-size="16" fill="#48bb78" opacity="0.7">√</text>
  
  <!-- Light bulb idea -->
  <circle cx="100" cy="60" r="12" fill="#fef5e7"/>
  <path d="M100 48 L105 53 L100 58 L95 53 Z" fill="#f6e05e"/>
  <rect x="97" y="65" width="6" height="8" fill="#d69e2e" rx="3"/>
</svg>